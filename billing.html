<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — DataCastle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        /* Reusing your exact Root and Global Styles */
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        :root{--blue:#1400ff;--blue2:#0040ff;--blue3:#0088ff;--cyan:#00ccff;--dark:#06060e;--dark2:#09091a;--card:#0f0f24;--card2:#13132c;--border:#1e1e45;--border2:#28285a;--text:#c8ceff;--muted:#5a5a9a;--green:#00ff88;--yellow:#ffdd00;--red:#ff6060;}
        body{background:var(--dark);color:var(--text);font-family:'Inter',sans-serif; min-height: 100vh; overflow-x: hidden;}
        
        nav{position:sticky;top:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:0 60px;height:64px;background:rgba(6,6,14,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
        .logo-name{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#fff,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        .billing-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 24px;
        }

        /* Product Side */
        .product-summary {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
        }
        .item-row {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .item-icon {
            font-size: 3rem;
            background: var(--dark2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border2);
        }
        .item-info h2 { font-family: 'Rajdhani'; color: #fff; text-transform: uppercase; }
        
        /* Pricing Side */
        .checkout-card {
            background: var(--card2);
            border: 1px solid var(--border2);
            border-radius: 20px;
            padding: 30px;
            height: fit-content;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .total-row {
            border-top: 1px solid var(--border);
            margin-top: 20px;
            padding-top: 20px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--cyan);
        }

        /* Coupon Styling */
        .coupon-wrap {
            margin-top: 25px;
            position: relative;
        }
        .coupon-input {
            width: 100%;
            padding: 12px 15px;
            background: var(--dark);
            border: 1px solid var(--border2);
            border-radius: 8px;
            color: #fff;
            outline: none;
        }
        .coupon-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            padding: 7px 12px;
            background: var(--blue);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
        }

        .pay-btn {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: linear-gradient(135deg, var(--blue), var(--blue2));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(20,0,255,0.3);
            transition: 0.3s;
        }
        .pay-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(20,0,255,0.5); }

        @media(max-width: 850px) {
            .billing-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo-wrap"><span class="logo-name">DataCastle</span></div>
    <a href="pricing.html" style="font-size: 13px; color: var(--muted)">← Back to Plans</a>
</nav>

<div class="billing-container">
    <div class="product-summary">
        <div class="item-row">
            <div class="item-icon" id="prodEmoji">⛏️</div>
            <div class="item-info">
                <h2 id="prodName">Minecraft Java</h2>
                <p style="color: var(--muted); font-size: 13px;">Enterprise Node • DDoS Protection Included</p>
            </div>
        </div>
        <div style="margin-top: 30px;">
            <h4 style="margin-bottom: 10px; font-size: 14px;">Plan Features:</h4>
            <ul style="color: var(--muted); font-size: 13px; line-height: 2;">
                <li>✓ Instant Deployment</li>
                <li>✓ 99.9% Uptime SLA</li>
                <li>✓ 24/7 Priority Support</li>
            </ul>
        </div>
    </div>

    <div class="checkout-card">
        <h3 style="margin-bottom: 20px; font-family: 'Rajdhani';">Order Summary</h3>
        
        <div class="price-row">
            <span>Base Price</span>
            <span id="basePrice">₹0</span>
        </div>
        <div class="price-row" id="discountRow" style="display: none; color: var(--green);">
            <span>Discount (AREEX10)</span>
            <span id="discountAmt">-₹0</span>
        </div>
        <div class="price-row">
            <span>GST (18%)</span>
            <span id="gstAmt">₹0</span>
        </div>

        <div class="price-row total-row">
            <span>Grand Total</span>
            <span id="totalPrice">₹0</span>
        </div>

        <div class="coupon-wrap">
            <input type="text" id="couponInput" class="coupon-input" placeholder="Enter Coupon Code">
            <button class="coupon-btn" onclick="applyCoupon()">Apply</button>
        </div>
        <p id="couponMsg" style="font-size: 11px; margin-top: 8px;"></p>

        <button class="pay-btn" onclick="openRazorpay()">Proceed to Pay</button>
    </div>
</div>

<script>
    // 1. DATA HANDLING (Simulating getting data from URL)
    const urlParams = new URLSearchParams(window.location.search);
    const game = urlParams.get('game') || 'Minecraft';
    const prices = { 'Minecraft': 149, 'Rust': 399, 'ARK': 349, 'FiveM': 499, 'Valheim': 299, 'DayZ': 449, 'Terraria': 149, 'Arma Reforger': 699, 'CS2': 249, '7 Days to Die': 299, 'V Rising': 349, 'Palworld': 399 };
    const emojis = { 'Minecraft': '⛏️', 'Rust': '🔫', 'ARK': '🦕', 'FiveM': '🏙️', 'Valheim': '🌊', 'DayZ': '☠️', 'Terraria': '🌾', 'Arma Reforger': '🎯', 'CS2': '💣', '7 Days to Die': '🧟', 'V Rising': '🧛', 'Palworld': '🐉' };

    let subtotal = prices[game] || 149;
    let discount = 0;

    function updateUI() {
        const gst = (subtotal - discount) * 0.18;
        const total = (subtotal - discount) + gst;

        document.getElementById('prodName').innerText = game;
        document.getElementById('prodEmoji').innerText = emojis[game];
        document.getElementById('basePrice').innerText = `₹${subtotal}`;
        document.getElementById('gstAmt').innerText = `₹${gst.toFixed(2)}`;
        document.getElementById('totalPrice').innerText = `₹${total.toFixed(2)}`;
        
        if(discount > 0) {
            document.getElementById('discountRow').style.display = 'flex';
            document.getElementById('discountAmt').innerText = `-₹${discount.toFixed(2)}`;
        }
    }

    // 2. COUPON LOGIC
    function applyCoupon() {
        const code = document.getElementById('couponInput').value.trim();
        const msg = document.getElementById('couponMsg');
        
        if (code === "AREEX10") {
            discount = subtotal * 0.10;
            msg.innerText = "Coupon Applied! 10% off";
            msg.style.color = "var(--green)";
            updateUI();
        } else {
            msg.innerText = "Invalid Coupon Code";
            msg.style.color = "var(--red)";
        }
    }

    // 3. RAZORPAY INTEGRATION
    function openRazorpay() {
        const finalAmt = parseFloat(document.getElementById('totalPrice').innerText.replace('₹', ''));
        
        var options = {
            "key": "YOUR_RAZORPAY_KEY", // Enter your Key ID from Razorpay Dashboard
            "amount": (finalAmt * 100).toFixed(0), // Amount in paise
            "currency": "INR",
            "name": "DataCastle Hosting",
            "description": "Payment for " + game + " Server",
            "image": "https://your-logo-url.com/logo.png",
            "handler": function (response){
                alert("Payment Successful! Payment ID: " + response.razorpay_payment_id);
            },
            "prefill": {
                "name": "User Name",
                "email": "user@example.com"
            },
            "theme": { "color": "#1400ff" }
        };
        var rzp1 = new Razorpay(options);
        rzp1.open();
    }

    updateUI();
</script>
</body>
</html>
